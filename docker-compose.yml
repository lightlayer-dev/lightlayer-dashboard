services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lightlayer
      POSTGRES_USER: lightlayer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lightlayer"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    environment:
      LIGHTLAYER_DATABASE_URL: postgresql+asyncpg://lightlayer:${POSTGRES_PASSWORD:-changeme}@db:5432/lightlayer
      LIGHTLAYER_SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      LIGHTLAYER_CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "cd /app && python -m alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
